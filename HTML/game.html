<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Sudoku</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght,XOPQ,XTRA,YOPQ,YTDE,YTFI,YTLC,YTUC@8..144,100..1000,96,468,79,-203,738,514,712&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="../CSS/game.css">
    </head>
    <body>
        <!-- Title -->
         <h1 class="title"></h1>
        
        <!-- Game Board -->
        <div class="boardContainer">
            <table id="sudokuBoard"></table>
        </div>  
        
        <!-- Additional Buttons -->
        <section id="additionalBtns" class="additionalBtns">
            <button id="eraseBtn" class="additionalBtn"><img src="../Icons/eraser.png" alt="" class="additionalBtnImg"></button>
        </section>

        <!-- Number Section -->
        <section id="numberSection" class="numberSection">
            <div class="numberContainer">
                <button class="number" data-number="1">1</button>
                <button class="number" data-number="2">2</button>
                <button class="number" data-number="3">3</button>
                <button class="number" data-number="4">4</button>
                <button class="number" data-number="5">5</button>
                <button class="number" data-number="6">6</button>
                <button class="number" data-number="7">7</button>
                <button class="number" data-number="8">8</button>
                <button class="number" data-number="9">9</button>
            </div>
        </section>  

        <!-- Scripts -->
        <script type="module" src="../JS/main.js"></script>
    </body>
</html>
