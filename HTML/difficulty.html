<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku</title>
    <link rel="stylesheet" href="../CSS/menu.css">
</head>
<body>

    <!-- HOME PAGE -->
    <div id="home" class="container">
        <!-- TITLE -->
        <h1 class="title"><span class="border">S</span><span class="border">U</span><span class="border">D
        </span><span class="border">O</span><span class="border">K</span><span class="border">U</span></h1>

        <!-- DIFFICULTY SELECTION -->
        <section id="modeSelection" class="modeSelection">
            <button id="easy" class="mode" data-difficulty = "easy">Easy</button>
            <button id="medium" class="mode" data-difficulty = "medium">Medium</button> 
            <button id="hard" class="mode" data-difficulty = "hard">Hard</button> 
        </section>
    </div>

    <!-- Link Scripts -->
     <script type="module" src="../JS/difficulty.js"></script>
</body>
</html>
